server:
  port: 8080

spring:
  application:
    name: loan-flow-test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ''
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1sb2FuLWZsb3ctanVuaXQtdGVzdGluZy1taW5pbXVtLTI1Ni1iaXRzLWtleQ==
  expiration-ms: 86400000